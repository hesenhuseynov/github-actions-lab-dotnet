name: 03 - Pull Request Trigger Test

on:
  workflow_dispatch:

  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  pr-trigger-test:
    runs-on: ubuntu-latest

    steps:
      - name: Show event name
        run: echo "Event name is ${{ github.event_name }}"

      - name: Show branch/ref
        run: echo "Git ref is ${{ github.ref }}"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show files
        run: ls -la