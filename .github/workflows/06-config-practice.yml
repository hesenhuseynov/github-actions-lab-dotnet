name: 06 - Workflow Configuration Practice

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Which environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

      runTests:
        description: 'Run test step?'
        required: true
        default: true
        type: boolean

  schedule:
    - cron: '35 13 26 5 *'

jobs:
  test-config:
    runs-on: ubuntu-latest

    steps:
      - name: Show trigger info
        run: |
          echo "Workflow triggered!"
          echo "Event name: ${{ github.event_name }}"
          echo "Schedule expression: ${{ github.event.schedule }}"
          echo "UTC time:"
          date -u
          echo "Baku time:"
          TZ="Asia/Baku" date