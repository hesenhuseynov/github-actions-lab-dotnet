name : Task workflow  

on:
 workflow_dispatch:
   inputs:
      enviroment: 
        description: 'Enviroment choose'
        required: true
        default: 'Dev'
        type: choice 
        options:
        - Staging
        - Production
        - Development
      run_db_migraitons: 
        description: "Is it  start to work  base migrations"
        required: true 
        default: false 
        type: boolean
      release_version:
        description: 'Release version (məs: v1.0.3)' 
        required: true 
        type: string
       
jobs:
  print-inputs:
   runs-on: ubuntu-latest 
   steps:
     - name: Daxil edilen meluamtlar  ekrana cap et 
       run: | 
        echo "Hedef Muhit  ${{github.event.inputs.environment}}"
        echo "Miqrasiyalar  ise dusecek mi ?  ${{github.event.inputs.run_db_migrations}}"
        echo "Deploy edilen  versiya: ${{github.event.inputs.release_version}}"